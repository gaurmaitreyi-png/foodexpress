# FoodExpress nginx site config.
# Copy to /etc/nginx/sites-available/foodexpress, then:
#   sudo ln -s /etc/nginx/sites-available/foodexpress /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl restart nginx
#
# Replace SERVER_NAME_HERE with your EC2 public IP (or domain once you have one).
# Static files are served by WhiteNoise inside Django, so no /static/ block is
# needed here — nginx just proxies everything to gunicorn.

server {
    listen 80;
    server_name SERVER_NAME_HERE;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OPTIONAL — only if you want nginx (not WhiteNoise) to serve static files.
    # Also run once:  chmod o+x /home/ubuntu
    # location /static/ {
    #     alias /home/ubuntu/foodexpress/backend/staticfiles/;
    # }
}
