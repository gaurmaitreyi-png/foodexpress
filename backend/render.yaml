services:
  - type: web
    name: foodexpress-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: foodexpress-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # AI chatbot — use Gemini in prod (Render can't reach a local Ollama).
      - key: CHAT_PROVIDER
        value: "gemini"
      - key: GEMINI_API_KEY
        sync: false  # set the secret value in the Render dashboard
      # Payments — Razorpay TEST keys (set secrets in the dashboard).
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: PAYMENTS_TEST_MODE
        value: "True"   # allows the MCP /simulate_payment/ path for demos
      # Google Sign-In — OAuth Web Client ID (set in the dashboard).
      - key: GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: foodexpress-db
    plan: free
